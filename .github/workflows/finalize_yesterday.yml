name: Finalize Last Week

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 * * 1"
    - cron: "15 11 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  finalize-last-week:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh last completed week in Google Sheet
        env:
          CTM_API_HOST: ${{ secrets.CTM_API_HOST }}
          CTM_API_KEY: ${{ secrets.CTM_API_KEY }}
          CTM_API_SECRET: ${{ secrets.CTM_API_SECRET }}
          CTM_ACCOUNT_ID: ${{ secrets.CTM_ACCOUNT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: ${{ secrets.GOOGLE_SHEET_TAB }}
        run: python upload_to_sheets.py --period last-completed-week --refresh-calls-cache
